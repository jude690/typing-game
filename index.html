<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAT: VFX Online Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --mc-bg: #212121;
            --mc-green: #55FF55;
            --mc-red: #FF5555;
            --mc-white: #FFFFFF;
            --mc-yellow: #FFFF55;
            --mc-gold: #FFD700;
            --mc-blue: #55FFFF;
            --mc-grey: #AAAAAA;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: var(--mc-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px; margin: 0;
            user-select: none;
        }

        .game-box {
            background-color: #313131; border: 4px solid #000;
            padding: 20px; width: 500px; text-align: center;
            box-shadow: 8px 8px 0px #000; margin-bottom: 20px;
        }

        #word-display { font-size: 70px; color: var(--mc-yellow); text-shadow: 4px 4px #000; margin: 20px 0; transition: 0.2s; }
        .gold-font { color: var(--mc-gold) !important; text-shadow: 0 0 15px var(--mc-gold) !important; }

        input {
            width: 85%; background: #4a4a4a; border: 4px solid #000;
            padding: 15px; color: white; font-size: 26px; text-align: center; outline: none;
        }

        .mc-btn {
            background-color: #333; color: white; border: 4px solid #000;
            padding: 10px 15px; cursor: pointer; margin: 5px; box-shadow: 3px 3px 0px #000;
            font-family: 'Courier New', monospace; font-weight: bold;
        }
        .mc-btn:active { transform: translate(2px, 2px); box-shadow: none; }

        /* Multi-Hub & Shop */
        .panel {
            background: #313131; border: 4px solid #000; padding: 15px;
            width: 480px; display: none; margin-top: 10px; box-shadow: 6px 6px 0px #000;
        }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .shop-item { background: #444; border: 3px solid #000; padding: 10px; cursor: pointer; font-size: 12px; }
        .shop-item:hover { background: #555; }
        .owned { color: var(--mc-green); border-color: var(--mc-green); opacity: 0.6; pointer-events: none; }

        #adv-popup {
            position: fixed; top: 20px; right: -400px; width: 300px; background: #222;
            border: 4px solid #000; padding: 10px; transition: 0.5s; z-index: 3000;
        }
        #adv-popup.show { right: 20px; }
        
        .xp-bar { width: 100%; height: 10px; background: #000; margin: 10px 0; border: 2px solid #555; }
        #xp-fill { height: 100%; width: 0%; background: var(--mc-green); transition: 0.3s; }
    </style>
</head>
<body>

    <div id="adv-popup">
        <div style="color:var(--mc-yellow); font-weight:bold;">Advancement!</div>
        <div id="p-name"></div>
    </div>

    <div style="margin-bottom: 10px;">
        <button class="mc-btn" id="online-btn" style="color:var(--mc-blue)">🌐 MULTIPLAYER HUB</button>
        <button class="mc-btn" id="shop-btn" style="color:var(--mc-gold)">🛒 BLACK MARKET</button>
    </div>

    <div id="multi-panel" class="panel">
        <h3 style="margin-top:0">Multiplayer Hub</h3>
        <div id="id-display" style="font-size:12px; margin-bottom:10px;">
            Your ID: <input type="text" id="my-id-box" readonly style="font-size:12px; padding:5px; width:60%; height:auto;">
        </div>
        <input type="text" id="join-id-box" placeholder="Paste Opponent ID here..." style="font-size:14px; padding:8px; width:90%; height:auto; margin-bottom:10px;">
        <br>
        <button class="mc-btn" id="connect-btn">CONNECT TO FRIEND</button>
    </div>

    <div id="shop-panel" class="panel">
        <h3 style="margin-top:0; color:var(--mc-gold)">Black Market</h3>
        <div class="shop-grid">
            <div class="shop-item" onclick="buy('gold', 100)" id="item-gold"><b>GOLD SKIN</b><br>Shiny Words<br>💰100</div>
            <div class="shop-item" onclick="buy('boost', 250)" id="item-boost"><b>XP BOOST</b><br>2x XP Gain<br>💰250</div>
            <div class="shop-item" onclick="buy('haste', 500)" id="item-haste"><b>HASTE</b><br>Faster Rounds<br>💰500</div>
        </div>
    </div>

    <div class="game-box">
        <div id="stats-ui">
            <div style="display:flex; justify-content:space-between; color:var(--mc-gold); font-size:14px;">
                <span>LVL <span id="lvl">1</span></span>
                <span>💰 <span id="coins">0</span></span>
            </div>
            <div class="xp-bar"><div id="xp-fill"></div></div>
        </div>

        <div id="word-display">READY?</div>
        <input type="text" id="type-input" placeholder="Type here..." autofocus autocomplete="off">
        
        <div id="timer" style="margin-top:15px; font-size:18px;">0.000s</div>
    </div>

    <script>
        const input = document.getElementById('type-input');
        const timerText = document.getElementById('timer');
        const wordDisplay = document.getElementById('word-display');
        const wordList = ["CREEPER", "NETHER", "DIAMOND", "BEDROCK", "REDSTONE", "VILLAGER", "STEVE", "DRAGON", "SKELETON", "ENDMAN"];

        let currentWord = "START", startTime, interval, active = false, mode = 'solo';
        let stats = { lvl: 1, xp: 0, coins: 0, xpReq: 100 };
        let powerups = { gold: false, boost: false };
        let peer, conn, isHost = false;

        // Toggle Panels
        document.getElementById('online-btn').onclick = () => togglePanel('multi-panel');
        document.getElementById('shop-btn').onclick = () => togglePanel('shop-panel');

        function togglePanel(id) {
            const p = document.getElementById(id);
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        // --- MULTIPLAYER ---
        peer = new Peer();
        peer.on('open', (id) => { document.getElementById('my-id-box').value = id; });

        document.getElementById('connect-btn').onclick = () => {
            const friendId = document.getElementById('join-id-box').value;
            if(friendId) {
                conn = peer.connect(friendId);
                setupSocket();
            }
        };

        peer.on('connection', (c) => {
            conn = c;
            isHost = true;
            setupSocket();
        });

        function setupSocket() {
            conn.on('open', () => {
                mode = 'pvp';
                document.getElementById('multi-panel').style.display = 'none';
                showPopup("CONNECTED TO OPPONENT!");
                if(isHost) sendNewWord();
            });
            conn.on('data', (data) => {
                if(data.type === 'WORD') {
                    currentWord = data.word;
                    wordDisplay.innerText = currentWord;
                    input.disabled = false; input.value = ""; input.focus();
                }
                if(data.type === 'FINISH') {
                    showPopup("Opponent Time: " + data.time);
                    if(isHost) setTimeout(sendNewWord, 2000);
                }
            });
        }

        function sendNewWord() {
            const w = wordList[Math.floor(Math.random() * wordList.length)];
            conn.send({type: 'WORD', word: w});
            currentWord = w;
            wordDisplay.innerText = w;
            input.disabled = false; input.value = ""; input.focus();
        }

        // --- CORE GAMEPLAY ---
        input.addEventListener('input', () => {
            const val = input.value.toUpperCase();
            if (!active && val.length > 0) {
                active = true;
                startTime = performance.now();
                interval = setInterval(() => {
                    timerText.innerText = ((performance.now() - startTime)/1000).toFixed(3) + "s";
                }, 10);
            }
            if (val === currentWord) {
                clearInterval(interval);
                active = false;
                const finalT = timerText.innerText;
                input.disabled = true;

                if (mode === 'pvp' && conn) {
                    conn.send({type: 'FINISH', time: finalT});
                } else {
                    addRewards();
                    setTimeout(() => { input.disabled = false; nextSoloWord(); }, 600);
                }
            }
        });

        function addRewards() {
            let gain = powerups.boost ? 40 : 20;
            stats.xp += gain;
            stats.coins += 15;
            if(stats.xp >= stats.xpReq) {
                stats.lvl++;
                stats.xp = 0;
                showPopup("LEVEL UP! Lvl " + stats.lvl);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('coins').innerText = stats.coins;
            document.getElementById('lvl').innerText = stats.lvl;
            document.getElementById('xp-fill').style.width = (stats.xp / stats.xpReq * 100) + "%";
        }

        function nextSoloWord() {
            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            wordDisplay.innerText = currentWord;
            input.value = "";
            input.focus();
        }

        function buy(item, price) {
            if(stats.coins >= price && !powerups[item]) {
                stats.coins -= price;
                powerups[item] = true;
                document.getElementById('item-'+item).classList.add('owned');
                if(item === 'gold') wordDisplay.classList.add('gold-font');
                updateUI();
                showPopup("PURCHASED!");
            } else if (stats.coins < price) {
                alert("Not enough coins!");
            }
        }

        function showPopup(msg) {
            document.getElementById('p-name').innerText = msg;
            document.getElementById('adv-popup').classList.add('show');
            setTimeout(() => document.getElementById('adv-popup').classList.remove('show'), 3000);
        }

        nextSoloWord();
    </script>
</body>
</html>
